version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: consignation_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: consignation_ocp
      MYSQL_USER: consignation_user
      MYSQL_PASSWORD: consignation_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - consignation_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consignation_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/TAG_Image:/app/TAG_Image
    depends_on:
      - db
    networks:
      - consignation_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: consignation_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: consignation_user
      PMA_PASSWORD: consignation_pass
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - consignation_network

volumes:
  db_data:

networks:
  consignation_network:
    driver: bridge